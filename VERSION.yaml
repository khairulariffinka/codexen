version: 0.1.1
name: CodeXen
description: Customizable AI coding agent framework for OpenCode with persistent memory, parallel subagent execution, and BRS/SRS/SDS specification chain
author: khairulariffinka
license: MIT
default_agent: codexen
topics:
  - ai-agent
  - opencode
  - coding-assistant
  - memory-system
  - subagent
  - parallel-execution
  - customizable
  - agentic-ai
  - brs
  - srs
  - sds

core_agents:
  - memory
  - planner
  - research
  - coder
  - auditor
  - security
  - backend-coder
  - frontend-coder
  - test-coder
  - devops-coder
  - security-auditor
  - performance-auditor
  - style-auditor
  - git-manager
  - docs-manager
  - decision-log
  - database-expert
  - api-designer
  - doc-scout
  - brs-manager
  - srs-manager
  - sds-manager

core_skills:
  - planner
  - research
  - coder
  - auditor
  - memory
  - security
  - decision-log
  - brs
  - srs
  - sds

template_skills:
  - setup-profile
  - init-project

features:
  - relationship-memory

paths:
  opencode_config: ~/.config/opencode
  opencode_agents: ~/.config/opencode/agents
  opencode_skills: ~/.config/opencode/skills

install:
  copy_core_agents: true
  copy_core_skills: true
  copy_primary_agent: true

update:
  preserve_user_agents: true
  preserve_user_skills: true
  update_core: true
